---
aid: ku-leuven
name: KU Leuven
description: >-
  KU Leuven (Katholieke Universiteit Leuven) is a research university in Leuven,
  Belgium, founded in 1425 and ranked #45 in the QS World University Rankings
  2025. It maintains a documented public developer footprint through its ICTS
  Data Services, which expose REST APIs for person/who-is-who information,
  curriculum information, organizational-chart data, research information,
  educational offerings, and job vacancies, alongside an OAuth-protected
  individual timetable API. KU Leuven also operates the Research Data Repository
  (RDR), a Dataverse-based institutional repository whose REST API is publicly
  reachable, and runs an active official GitHub organization.
