  - date: '2026-06-03'
    rating: 3
    summary: >-
      KU Leuven has a genuinely documented public developer footprint via ICTS
      Data Services (person, curriculum, organigram, research, educational
      offering, vacancies REST APIs) plus an OAuth-protected individual timetable
      API, and a Dataverse-based Research Data Repository (RDR). The RDR public
      info endpoint was verified live returning version 6.7.1; all documentation
      and portal pages probed returned HTTP 200. RDR write access and the intranet
      variants are gated (API token, ORCID, roles, service accounts). No single
      unified API gateway/portal with self-serve keys was found, and no machine
      OpenAPI spec is publicly served (the RDR OpenAPI doc is restricted to KU
      Leuven IPs). Rated 3 for a real, documented but partly gated footprint.
      No endpoints or properties were fabricated.
