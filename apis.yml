apis:
  - aid: ku-leuven:rdr
    name: KU Leuven Research Data Repository (RDR) API
    description: >-
      Dataverse-based institutional research data repository API. Largely aligned
      with the upstream Dataverse.org API. The public info endpoints (e.g.
      /api/info/version) are reachable without authentication; write operations
      require an API token, a registered ORCID and the Dataset Creator role.
    humanURL: https://www.kuleuven.be/rdm/en/rdr/api-documentation
    baseURL: https://rdr.kuleuven.be/api
    tags: [ Research Data, Dataverse, Open Data, Repository ]
